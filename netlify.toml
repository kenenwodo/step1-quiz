# Static site + one serverless function (password check for question requests).
# Netlify Forms is auto-detected from the hidden blueprint form in index.html.
[build]
  publish = "."
  functions = "netlify/functions"

# Short URL: /api/request-questions -> the function
[[redirects]]
  from = "/api/request-questions"
  to = "/.netlify/functions/request-questions"
  status = 200
